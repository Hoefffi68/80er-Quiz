<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>80er Quiz</title>
    <style>
        body { background: #050510; color: #0ff; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { border: 2px solid #f0f; padding: 20px; border-radius: 15px; box-shadow: 0 0 15px #0ff; max-width: 500px; margin: auto; }
        .btn { background: none; border: 1px solid #0ff; color: #0ff; padding: 10px; width: 100%; margin: 5px 0; cursor: pointer; font-size: 1.1rem; }
        .btn:hover { background: #0ff; color: #000; }
        #timer { color: #f0f; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>80s Quiz</h1>
        <div id="game">
            <div id="timer">Zeit: 10</div>
            <p id="question">Lade...</p>
            <div id="options"></div>
        </div>
        <div id="result" style="display:none">
            <h2>Fertig!</h2>
            <p id="score"></p>
            <button class="btn" onclick="location.reload()">Neustart</button>
        </div>
    </div>

<script>
    const data = [
        { q: "Interpret von 'Shout'?", opts: ["Tears for Fears", "Simple Minds", "A-ha"], a: "Tears for Fears" },
        { q: "Wer sang 'Take On Me'?", opts: ["a-ha", "Duran Duran", "Depeche Mode"], a: "a-ha" }
    ];

    let idx = 0, score = 0, timeLeft = 10, timer;

    function show() {
        if(idx >= data.length) return end();
        const q = data[idx];
        document.getElementById('question').innerText = q.q;
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = '';
        q.opts.sort(() => Math.random() - 0.5).forEach(o => {
            const b = document.createElement('button');
            b.innerText = o; b.className = 'btn';
            b.onclick = () => check(o);
            optDiv.appendChild(b);
        });
        startTimer();
    }

    function startTimer() {
        timeLeft = 10;
        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = "Zeit: " + timeLeft;
            if(timeLeft <= 0) check("");
        }, 1000);
    }

    function check(sel) {
        if(sel === data[idx].a) score++;
        idx++; show();
    }

    function end() {
        clearInterval(timer);
        document.getElementById('game').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('score').innerText = score + " von " + data.length + " richtig!";
    }

    show();
</script>
</body>
</html>
